<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>中学イベント情報まとめ</title>
  <style>
    :root {
      --bg: #f5f7f3;
      --surface: #ffffff;
      --surface-2: #fafbf7;
      --ink: #14191c;
      --muted: #50595d;
      --line: #ccd5d1;
      --line-soft: #e3e9e6;
      --accent: #1e655c;
      --accent-2: #8a3434;
      --accent-3: #a06a18;
      --soft: #e3edea;
      --shadow: 0 14px 32px rgba(20, 30, 35, 0.10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "YuGothic", "Noto Sans JP", sans-serif;
      font-size: 16px;
      line-height: 1.7;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header {
      background: #173b3b;
      color: #fff;
      border-bottom: 5px solid #c28a35;
    }

    .topbar {
      max-width: 1180px;
      margin: 0 auto;
      padding: 32px 24px 28px;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: #c5dcd7;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4.4vw, 44px);
      line-height: 1.2;
      letter-spacing: 0;
    }

    .header-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 6px 14px;
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 999px;
      color: #f1faf7;
      background: rgba(255,255,255,0.10);
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 32px 24px 24px;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: grid;
      grid-template-columns: minmax(220px, 1.2fr) minmax(180px, 0.8fr) minmax(160px, 0.7fr) minmax(130px, 0.5fr);
      gap: 14px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255,255,255,0.97);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    input, select {
      width: 100%;
      min-height: 44px;
      border: 1px solid #b9c4c0;
      border-radius: 8px;
      padding: 10px 12px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 15px;
    }

    input:focus, select:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
      border-color: var(--accent);
    }

    .summary-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin: 28px 0;
    }

    .metric {
      min-height: 96px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface);
    }

    .metric strong {
      display: block;
      font-size: 32px;
      line-height: 1.1;
      color: var(--accent);
      font-weight: 800;
    }

    .metric span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }

    .section-title {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin: 44px 0 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--line);
    }

    h2 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0;
      font-weight: 800;
    }

    .section-title .muted, .section-title span.muted {
      font-size: 14px;
    }

    .muted { color: var(--muted); }

    .calendar-panel {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface);
      overflow: hidden;
    }

    .calendar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-2);
    }

    .calendar-head h3 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
      font-weight: 800;
    }

    .calendar-head select {
      max-width: 220px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
    }

    .weekday {
      min-height: 38px;
      padding: 10px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: #e9f0ec;
      color: #3f4a4d;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-align: center;
    }

    .weekday:nth-child(7n) { border-right: 0; }

    .day {
      min-height: 140px;
      padding: 10px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .day:nth-child(7n) { border-right: 0; }

    .day.is-empty {
      background: #f3f5f2;
    }

    .day-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      min-height: 30px;
      margin-bottom: 8px;
      border-radius: 6px;
      color: var(--ink);
      font-size: 14px;
      font-weight: 800;
    }

    .day.has-events .day-number {
      background: var(--accent);
      color: #fff;
    }

    .cal-event {
      display: block;
      margin: 6px 0;
      padding: 7px 9px;
      border-left: 3px solid var(--accent-2);
      border-radius: 5px;
      background: #f8edec;
      color: var(--ink);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.4;
    }

    .cal-event small {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-weight: 600;
      font-size: 12px;
    }

    .print-actions {
      display: flex;
      justify-content: flex-end;
      margin: 14px 0 0;
    }

    .print-calendar {
      display: none;
    }

    .school-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .school-table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface);
      font-size: 14px;
    }

    .school-table th,
    .school-table td {
      padding: 13px 14px;
      border-bottom: 1px solid var(--line-soft);
      vertical-align: top;
      text-align: left;
    }

    .school-table th {
      background: #e9f0ec;
      color: #3f4a4d;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .school-table tr:last-child td {
      border-bottom: 0;
    }

    .school-table tbody tr:hover {
      background: var(--surface-2);
    }

    .dev {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      min-height: 30px;
      padding: 0 8px;
      border-radius: 6px;
      background: #173b3b;
      color: #fff;
      font-size: 13px;
      font-weight: 800;
    }

    .dev-list {
      display: grid;
      gap: 6px;
      min-width: 140px;
    }

    .dev-line {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      min-height: 28px;
      padding: 5px 10px;
      border: 1px solid #cdded8;
      border-radius: 6px;
      background: #f4f9f6;
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
    }

    .dev-line span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .dev-line strong {
      text-align: right;
      overflow-wrap: anywhere;
    }

    .dev-line a {
      color: inherit;
      text-decoration: none;
    }

    .school {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface);
      transition: box-shadow 0.15s ease;
    }

    .school:hover {
      box-shadow: var(--shadow);
    }

    .school h3 {
      margin: 0 0 8px;
      font-size: 19px;
      letter-spacing: 0;
      font-weight: 800;
    }

    .school-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .school-title h3 {
      margin: 0;
    }

    .school .dev-list {
      margin: 10px 0;
      max-width: 340px;
    }

    .school p {
      margin: 6px 0;
      color: var(--muted);
      font-size: 14px;
    }

    .school-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: stretch;
      min-width: 96px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 8px 14px;
      border: 1px solid var(--accent);
      border-radius: 8px;
      color: var(--accent);
      background: #fff;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      transition: background 0.15s ease;
    }

    .btn:hover {
      background: var(--soft);
      text-decoration: none;
    }

    .events {
      display: grid;
      gap: 14px;
    }

    .event {
      display: grid;
      grid-template-columns: 160px minmax(0, 1fr) 170px;
      gap: 18px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface);
      transition: box-shadow 0.15s ease;
    }

    .event:hover {
      box-shadow: var(--shadow);
    }

    .datebox {
      display: grid;
      align-content: start;
      gap: 6px;
      min-height: 80px;
      padding: 14px;
      border-left: 4px solid var(--accent);
      background: var(--soft);
      border-radius: 8px;
    }

    .datebox .date {
      font-weight: 800;
      font-size: 17px;
      color: var(--ink);
    }

    .datebox .time {
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }

    .event h3 {
      margin: 0 0 8px;
      font-size: 19px;
      letter-spacing: 0;
      font-weight: 800;
      line-height: 1.4;
    }

    .event-school {
      margin: 0 0 6px;
      color: var(--accent-2);
      font-size: 14px;
      font-weight: 800;
    }

    .event-school .dev {
      min-width: 32px;
      min-height: 24px;
      margin-right: 8px;
      font-size: 12px;
      vertical-align: middle;
    }

    .event-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 12px;
      border-radius: 999px;
      background: #ece8de;
      color: #4a443a;
      font-size: 13px;
      font-weight: 700;
    }

    .tag.reserve { background: #ffeacb; color: #84541a; }
    .tag.start { background: #f6dada; color: var(--accent-2); }
    .tag.precision { background: #e1e7ee; color: #3b4956; }

    .note {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .event-actions {
      display: grid;
      align-content: start;
      gap: 10px;
    }

    .empty {
      padding: 32px;
      border: 1px dashed #b3bfba;
      border-radius: 10px;
      background: #fff;
      color: var(--muted);
      font-size: 15px;
      text-align: center;
    }

    footer {
      max-width: 1180px;
      margin: 0 auto;
      padding: 16px 24px 40px;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 900px) {
      .toolbar, .summary-row, .school-grid, .event {
        grid-template-columns: 1fr;
      }
      .toolbar { position: static; }
      .school { grid-template-columns: 1fr; }
      .school-actions, .event-actions { display: flex; flex-wrap: wrap; }
      .school-table { display: block; overflow-x: auto; white-space: nowrap; }
    }

    @page {
      size: A4 portrait;
      margin: 10mm;
    }

    @media print {
      body {
        background: #fff;
        color: #000;
      }

      header, main, footer {
        display: none;
      }

      .print-calendar {
        display: block;
      }

      .print-month {
        page-break-after: always;
        break-after: page;
        width: 100%;
      }

      .print-month:last-child {
        page-break-after: auto;
        break-after: auto;
      }

      .print-title {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 8mm;
        margin: 0 0 4mm;
        border-bottom: 0.4mm solid #000;
        padding-bottom: 2mm;
      }

      .print-title h1 {
        margin: 0;
        color: #000;
        font-size: 16pt;
        line-height: 1.2;
      }

      .print-title p {
        margin: 0;
        color: #333;
        font-size: 8pt;
      }

      .print-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        border-top: 0.25mm solid #777;
        border-left: 0.25mm solid #777;
      }

      .print-weekday {
        min-height: 7mm;
        padding: 1.5mm;
        border-right: 0.25mm solid #777;
        border-bottom: 0.25mm solid #777;
        background: #e9ece9;
        font-size: 8pt;
        font-weight: 700;
        text-align: center;
      }

      .print-day {
        min-height: 34mm;
        padding: 1.5mm;
        border-right: 0.25mm solid #777;
        border-bottom: 0.25mm solid #777;
        overflow: hidden;
      }

      .print-day.empty {
        background: #f4f4f4;
      }

      .print-day-number {
        display: block;
        margin-bottom: 1mm;
        font-size: 8pt;
        font-weight: 800;
      }

      .print-event {
        margin: 0 0 1mm;
        padding-left: 1.2mm;
        border-left: 0.7mm solid #555;
        font-size: 6.8pt;
        line-height: 1.25;
        overflow-wrap: anywhere;
      }

      .print-event strong {
        display: block;
        font-size: 6.8pt;
      }

      .print-event span {
        display: block;
        color: #333;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <p class="eyebrow">2026年度 学校説明会・イベント</p>
      <h1>中学イベント情報まとめ</h1>
      <div class="header-meta">
        <span class="pill">対象校 10校</span>
        <span class="pill">イベント 127件</span>
        <span class="pill">取得基準日 2026-04-30</span>
        <span class="pill">出典 中学受験スタディ</span>
      </div>
    </div>
  </header>

  <main>
    <section class="toolbar" aria-label="絞り込み">
      <label>検索
        <input id="q" type="search" placeholder="学校名・イベント名・備考で検索">
      </label>
      <label>学校
        <select id="schoolFilter"></select>
      </label>
      <label>場所
        <select id="placeFilter">
          <option value="">すべて</option>
          <option value="本校">本校</option>
          <option value="オンライン">オンライン</option>
        </select>
      </label>
      <label>表示
        <select id="limitFilter">
          <option value="all">全件</option>
          <option value="30">直近30件</option>
          <option value="60">直近60件</option>
        </select>
      </label>
    </section>

    <section class="summary-row" aria-label="集計">
      <div class="metric"><strong id="visibleCount">0</strong><span>表示中のイベント</span></div>
      <div class="metric"><strong id="schoolCount">10</strong><span>対象校</span></div>
      <div class="metric"><strong id="reserveCount">0</strong><span>予約URLあり</span></div>
      <div class="metric"><strong id="startCount">0</strong><span>予約開始情報あり</span></div>
    </section>

    <section>
      <div class="section-title">
        <h2>学校情報</h2>
        <span class="muted">出典別偏差値・種別・イベント数</span>
      </div>
      <div id="schools" class="school-grid"></div>
    </section>

    <section>
      <div class="section-title">
        <h2>月別カレンダー</h2>
        <span id="calendarSummary" class="muted"></span>
      </div>
      <div class="calendar-panel">
        <div class="calendar-head">
          <h3 id="calendarTitle">-</h3>
          <select id="monthFilter" aria-label="表示月"></select>
        </div>
        <div id="calendar" class="calendar-grid"></div>
      </div>
      <div class="print-actions">
        <button class="btn" type="button" onclick="window.print()">A4月別カレンダーを印刷</button>
      </div>
    </section>

    <section>
      <div class="section-title">
        <h2>イベント一覧</h2>
        <span id="eventSummary" class="muted"></span>
      </div>
      <div id="events" class="events"></div>
    </section>
  </main>

  <footer>
    掲載情報は取得時点のものです。参加前に各校の公式サイトで最新情報を確認してください。

力をつける。", "詳細_施設設備": "パイプオルガンのある大講堂 歴史と伝統の重みが感じられる美しい校舎で学ぶ。パイプオルガンの設置された大講堂は、学院のシンボルとなっている。メモリアルチャペルは、クラス礼拝や聖書輪読会などで使用。各自の端末から予約ができる蔵書5.2万冊の図書室。様々な学習形態に対応できるマルチラーニングルームや社会科教室などに象徴される充実したICT環境。集会室には軽食と飲み物を購入できる売店がある。", "詳細_学校行事": "高等部卒業式ではロッシーニの聖歌を合唱 キリスト教関連の行事や体験的な行事が豊富。5月には高2修学旅行（九州）、中2・中3学年行事（学年別に水泳教室や自然観察など）、高3修養会は清里にて2泊3日、牧師の講演やディスカッションなど充実したプログラム。6月の高1カンファレンスは、牧師を囲んで生き方について語り合う。7月には中学合唱コンクール、長野県野尻湖畔での夏期学校やキャンプ。8月には修養会、カナダ研修（3月はオーストラリア研修）、10月には体育祭、楓祭（文化祭）、12月にはクリスマス礼拝。たくさんの行事を通じた学びを行う。3月の高等部卒業式では、ロッシーニの聖歌を合唱することが伝統となっている。ちなみに、高3は「合唱」が必修科目。", "詳細_部活動": "全学年、全生徒がいずれかの部活に参加 中学から高校までの全学年、全生徒がいずれかの部活に参加している。文化部は、文芸部、手芸部、料理部、写真部、生物部、園芸部、化学部、英語劇部、ダンス部、音楽部、ハンドベル部、合唱部など。運動部はバスケットボール部、バレーボール部、テニス部、剣道部、ワンダーフォーゲル部、スキー部など。", "詳細_進路指導": "進路は多様化、理数系への進学が増加中 中3～高3までの総合学習で「進路学習」を行っている。卒業後の生き方、仕事、将来の進路について、学年に応じて考えることで、将来の目標をより明確にしていく。高校では卒業生による講演会や受験体験談、模擬試験などを進路指導の一環として行っている。 東洋英和女学院大学への内部推薦があり、推薦条件を満たしていれば面接と書類審査により進学できる。 大学合格実績は、国公立大学をはじめ、早慶上智、GMARCH、国際基督教大などに多数現役で合格。医学部進学者が多いのも特徴。", "詳細_その他": "国際教育 伝統的に国際教育に力を入れる東洋英和女学院は、バングラデシュに寺子屋を建てる支援活動に加え、TEAM＋（Toyo Eiwa Activities for Myanmar＋）として、途上国支援研究や活動に取り組んでいる。また、カナダ、オーストラリア研修に加え、補助金制度を利用した短期留学制度もある。1年間の長期留学では留年することなく学校に復帰できる制度を設けている。2020年度には専属の職員が常駐する海外留学支援室もリニューアルされ、留学や語学研修、海外大学への進学などの相談もいつでもできる体制が整っている。", "詳細_制服": "歴史と伝統のセーラー服 1929年から時代を超えて受け継がれているセーラー服。 スクールカラーであるガーネット＆マリーゴールドがあしらわれたデザインは、当時の校長ハミルトン先生によるもの。 冬は濃紺、夏は真っ白なセーラーカラーにガーネットのシルクのネクタイがよく映え、冬服の襟やカフスに入っているマリーゴールドの2本のラインも特徴的だ。 歴史と伝統ある制服を、英和生は誇りに思い、大切にしている。", "詳細ページ": "schools/B13P098.html", "過去問PDF件数": "214"}, {"学校名": "東京大学教育学部附属中等教育学校", "study1_id": "B13N007", "住所": "〒164-8654 東京都中野区南台1-15-1", "TEL": "TEL 03-5351-9050", "最寄駅・アクセス": "京王線「幡ヶ谷駅」北口より徒歩15分、丸ノ内線「中野新橋駅」より徒歩10分、都営大江戸線「西新宿五丁目駅」より徒歩15分、バス「東大付属」下車徒歩1分ほか", "公式URL": "http://www.hs.p.u-tokyo.ac.jp/", "スタディURL": "https://www.study1.jp/kanto/school/B13N007/", "説明会URL": "https://www.study1.jp/kanto/school/B13N007/briefing/", "設置": "国立中学", "学校種別": "共学校", "偏差値一覧地域": "東京23区", "スタディ偏差値": "53", "スタディ偏差値URL": "https://www.study1 バルハイスクール（SGH）」の指定を受け、「サステイナビリティ（持続可能性）から創造するグローバル社会」をテーマに、地球規模の社会課題を解決する探究学習に取り組んでいる。 ●英語力に応じたコース設定 中学「一般コース」の英語は、教科書ベースの授業、独自カリキュラム、ネイティブの授業を組み合わせた多彩な学びを少人数で行う。中学「英語特別コース」は、英語の授業内容がより発展的になり、英語のレベルに応じてA・B・インターに分かれる。カリキュラム上、英語以外の教科内容はどちらのコースも同じで、基礎学力の定着から発展的内容まできめ細かくフォローする。 高校「グローバルコース（一般）」は、授業のほか、課題や特別講座で基礎的及び発展的な内容を学習。グローバル教育の様々なプログラムにチャレンジでき、探究学習を通して思考力、創造力、行動力を養い、協働する姿勢やプレゼンテーション能力も身につけていく。高校「アドバンストコース」は、英語以外の教科内容は「グローバルコース」と同じだが、英語の授業内容がより発展的になり、英語のレベルに応じてA・B・インターに分かれる。スポーツ・芸術（バレエなど）で積極的に対外試合（活動）や海外遠征に挑む生徒は、いずれかのコースに属しながらグローバルアスリートの認定を受け、学期中でも特別欠席で活動することが可能。 ●4技能を伸ばす先進的な英語教育 英語の授業は、「読む」「書く」「聞く」「話す」の4技能を意識したアクティブラーニング型による最新の指導法を取り入れている。毎週末の課題として実施している「週末エッセイライティング」（中1～高3）では、中1は日記、中2以降は与えられたトピックについて賛否の理由を示しながらエッセイを書き上げ、ネイティブ教員と日本人教員が添削。「書く」ことと改善点の気付きを得る機会を習慣として確立することにより、生徒の多くはライティングを得意分野として資格試験の取得にも役立てている。週に1回取り組む「オンライン英会話」（中2～高2）では、1対1で海外のネイティブスピーカーと会話を行うことで、臆することなく発話する勇気と英語力を身につける。辞書を使わずにできるだけ多くの英書を読む授業「Extensive Reading」（中2～高1）では、単語力、読解力、速読力、文法力を養成し、英語で読むことへの慣れを育む。", "詳細_施設設備": "万全な安全対策 災害時に最低3日間の電気の供給が可能な大型自家発電装置、災害時対応汚水処理槽、各フロアに警報装置やAEDを設置。カメラによる集中監視システムなど万全な安全確保に努めている。温もりあるレンガ校舎は、ルーフバルコニー、ペントハウスラウンジ、ウッディテラスなど憩いの場が豊富。茶室「忠恕庵」は坪庭つき。理科実験室、調理室、CALL教室など最新設備が整っている。", "詳細_学校行事": "中学の修学旅行はオーストラリア 体育祭（6月）や文化祭（9月）のほか、独自の行事も多い。中学3年次のオーストラリア修学旅行（全員参加）では、現地の姉妹校を訪問し、生徒同士の交歓行事と授業体験に参加。春休みにはイギリス短期留学（中2～高2の希望者）を実施し、チェルトナムでホームステイをしながら、語学研修やアクティビティを行う。 高校1年次には、連携校と課題を議論する「鹿児島フィールドワーク」（10月）を実施。2泊3日で鹿児島の産業・歴史や環境問題に関わる施設をめぐるとともに、Super Science High Schoolである池田高校と互いの探究学習の成果を発表し、意見交換を行う。高校2年次には、アメリカ西海岸修学旅行（11月）で姉妹校の生徒たちと授業に参加したり、交歓会で交流を深め、UCLAやディズニーランドなどにも足を運ぶ。高校2年次1月には、探究学習の集大成として「グローバルスタディ演習」に取り組む「海外フィールドワーク」（選択者）を実施。選んだテーマによってグアム、マレーシア、台湾で高大連携のプロジェクト学習を行い、フィールドワークと現地での英語プレゼンテーションを実施する。その成果発表の場として、2月に「SGH WWL研究発表会」を開催。", "詳細_部活動": "テニス部、少林寺拳法部は全国レベルで活躍 テニス部は全国大会連続出場中の強豪校、少林寺拳法部も全国レベルで活躍している。近年活躍がめざましい模擬国連部は、週1回の活動をネイティブ教員と日本人教員がバックアップ。模擬国連大会への出場だけでなく、様々な英語コンテストに出場して入賞する部員も多い。模擬国連部での活動や探究活動、医療に関わる学部で学んで世界の役に立ちたいという思いなどが評価され、「柳井正財団海外奨学金」（授業料や生活支援金など、4年間の学生生活をトータルで支援する給付型）に合格してアメリカのジョージア工科大学に進学した卒業生もいる。上智大学が開催する高校生英語弁論大会「ジョン・ニッセル杯」で1位となり、上智大学に4年間の授業料全額免除で入学するなど、模擬国連部での活動を進路につなげていく生徒も増えている。", "詳細_進路指導": "一人ひとりの夢を徹底サポート 個々の強みを活かした進学を実現するために、コースに関係なく、一人ひとりの夢を徹底サポートする進路指導プログラムを用意。総合型選抜や学校推薦型選抜などの強みとなる探究活動や部活動、ボランティア活動などにも力を入れ、中学1年次から様々な働きかけを行っている。総合型選抜などで必要な志望理由書は担当教員がしっかりサポートし、一般選抜の対策なども丁寧にフォロー。上智やICU、青山など、グローバル教育に力を入れている国内の難関大学のみならず、世界大学ランキングで上位にランキングされている海外大学へ進学する生徒も増えている。2023年～2024年の2年間で、トップレベルの海外大学に18名合格。", "詳細_その他": "慶應義塾大学、ハワイ大学などと連携 これまでの教育実績をもとに、SGHとしてグローバル教育を推進。高校の「グローバルスタディ演習」の授業では、慶應義塾大学やハワイ大学などとの高大連携や、アジアでの海外フィールドワークを通して、研究やレポート作成、発表、英語での発信などを行う。これらの活動によって、問題を発見・探究し、解決する力や高い英語運用力を育成。", "詳細_制服": "ブリティッシュ・トラッド イギリスへの海外留学を他校に先駆けて1972年にスタートし、姉妹校との交流は50年以上の歴史を数える。2018年度から変わった制服は、イギリスの学校をイメージして「ブリティッシュ・トラッド」を意識したデザインを取り入れた。冬服は、チャコールグレーのジャケットの襟にテーピングを施し、スカートはイギリス伝統のタータンチェックの巻きスカート風。ワインカラーのセーターは、制服としては珍しい。リボン（中学：薄いグレー、高校：濃いグレー）は、普段の生活では外して過ごすことも可能。夏服は、胸元にエンブレムの刺繍が入った爽やかなオーバーブラウスで、スカートの柄は冬服と色を反転させた軽やかなオールプリーツ。ブラウスの襟のパイピングとボタンは中高で色違い（中学：エンジ、高校：紺）となっており、赤のライン入りライトグレーのカーディガンも用意されている。", "詳細ページ": "schools/B13P113.html", "過去問PDF件数": "9"}, {"学校名": "実践女子学園中学校", "study1_id": "B13P056", "住所": "〒150-0011 東京都渋谷区東1-1-11", "TEL": "TEL 03-3409-1771", "最寄駅・アクセス": "各線「渋谷駅」より徒歩10分、各線「表参道駅」B1より徒歩12分", "公式URL": "https://hs.jissen.ac.jp/", "スタディURL": "https://www.study1.jp/kanto/school/B13P056/", "説明会URL": "https://www.study1.jp/kanto/school/B13P056/briefing/", "設置": "私立中学", "学校種別": "女子校", "偏差値一覧地域": "東京23区", "スタディ偏差値": "50", "スタディ偏差値URL": "https://www.study1.jp/kanto/list/deviation.html", "キャッチコピー": "進化する女子伝統校。多様な留学先、海外大学進学者も増加", "注目ポイント": "渋谷駅より徒歩10分、閑静な文教地区に敷地25,000㎡のキャンパスが広がる。お辞儀の作法や和室での所作を学ぶ礼法の授業や、華道・茶道・着付などからお稽古を1つ選ぶ「日本文化実習」など、品格や日本文化を学ぶ一方で、グローバル教育にも力を入れている。グローバル教育としては、ドイツ、中国、タイへの交換留学やオーストラリアへの短期留学などを実施する。カナダの大学の推薦入学制度もあり、海外大学への進学者も増えている。国内大学は早慶上理、GMARCHなど合格者多数。系列の実践女子大学への推薦制度もあり、合格をもった状態で他大学の一般受験に挑戦することもできる。", "生徒総数": "男子 ： - 名 / 女子 ：764名 / クラス数 ：22クラス", "学費サマリー": "初年度納入金合計 / 年間学費 | 1,145,400 円 / 915,400 円", "特徴サマリー": "高校入試(募集) / 学期 / 登校時間 / 完全下校時間 / 土曜授業 | な 0:50 C50:47", "四谷大塚URL": "https://www.yotsuyaotsuka.com/juken/data/?code=285", "詳細_建学の精神、教育理念": "女性が社会を変える、世界を変える 建学の精神は「女性が社会を変える、世界を変える」、教育理念は「堅実にして質素、しかも品格ある女性の育成」。このため生徒は、良識を養い、実践を尚び、責任を重んずることを日常の心がけとしている。価値観が多様化している現代において、まずは生徒自身が自分なりの軸となるものを作り出すこと、そして、広い視点をもって社会に参画していくことを目指している。", "詳細_教育の特色": "未来につながる力「実践力」を育成 「探究教育」「グローバル教育」「感性表現教育」を3本柱に据えている。 探究教育：他者のもつ異なる視点を理解し多様な文化・習慣・価値観を尊重し、共に生きる「地球市民」の育成を目指している。オリジナルの探究授業「未来デザイン」では「国際・異文化理解」「環境」「社会・経済」の3つのテーマを設定し、SDGｓ(持続可能な開発目標)を主な軸として学ぶ。「教わる授業」ではなく「体験する・考える授業」で、主体的に考えて判断し、行動する「実践力」を養う。 グローバル教育：自分の文化と世界を知り、自ら行動すること。また、そのために必要なコミュニケーションスキルを鍛えることを目指す。 日本文化実習、Englishキャンプ、Englishセミナー、ネイティブ教員による放課後講座、海外研修（オーストラリア・ニュージーランド）、交換留学（タイ・中国・ドイツ）、短期留学（オーストラリア）などがある。 感性表現教育：教科教育をはじめ、学校行事やクラブ活動などすべてが感性を磨くための学びであると捉え、多くの機会を設定している。特に、表現する場（ときわ祭、運動会、レシテーションコンテスト、部活発表会など）において感動を分かち合うなかで、観る力、聴く力、感じる力を高めていく。", "詳細_施設設備": "渋谷・青山エリアの文教地区にゆとりのキャンパス 敷地25,000㎡のゆとりのキャンパスは渋谷駅徒歩10分、表参道駅徒歩12分、閑静な文教地区にある。 美しい校舎「桃夭館（とうようかん）」には最新施設が充実。図書館も含めたメディアセンター、プレゼンテーションルーム、日本文化実習室を設置し、情報発信・受信、グローバル教育など最新の教育に対応している。 120周年を記念して体育館も新たに建設され、すべての体育部が活動できるような3階建ての大きな施設もあり、高校生の球技大会も開催されている。また、校庭も人工芝となり、テニスコート6面分の広さをもつ。ここで中学の運動会も開催する。", "詳細_学校行事": "多様な行事と体験学習で人間性を磨く 球技大会（高校）、ときわ祭（文化祭）、運動会（中学）、かるた大会（中学）、合唱コンクール（中学）、イングリッシュデー（中学レシテーション・高校スピーチコンテスト）、テーブルマナー（高3）、ユネスコスクールとして年2回の国際デーなど。中1～高1で修学旅行や移動教室などを実施。高1の修学旅行はシンガポール・ニュージーランド・沖縄からの選択制。", "詳細_部活動": "苦楽・感動を共有し、豊かな人間性を育む 校友会（クラブ活動）として学術部会、芸能部会、体育部会、特殊部会の4部門と同好会が合計34あり、充実している。芸能部は、美術、写真、吹奏楽、フォークソング、室内楽など。学術部は、理科、家政、被服、国語文芸、英語など。体育部は、バドミントン、硬式テニス、ダンス、ソフトテニス、卓球など。中1の日本文化実習を引き続き学ぶことのできる特殊部会には、華道、箏曲、茶道、和装着付、能楽があり、他のクラブとの兼部が可能。同好会はグローバル研究会と園芸同好会がある。", "詳細_進路指導": "キャリア教育と連携して進路選択をサポート 多くの無料講座や指名制の補習、勉強合宿や授業内での小テストの実施など、きめこまかな指導で学力の定着をはかるとともに、自分のキャリアプランを見据え、大学・学部・学科を選択することを重視した進路サポートを行っている。中学ではさまざまな職業を体験できる「出前授業」や、大学在学中の卒業生からアドバイスを受ける「キャリア講演会」などを実施している。 また、中学3年から高校にかけて、理系・文系選択や自己分析・自己理解のための進路適性検査や専門のアドバイザーによる進路・受験についての講演、卒業生や現役大学生による学習方法などについてのアドバイス、大学模擬授業、学内大学ガイダンス、共通テスト対策や大学別入試対策講座など、多彩なプログラムによって進路選択をサポートしている。", "詳細_その他": "高大連携や企業 Gの生徒たちも英語力を大きく伸ばしている。また、生徒たちは中高を通じて、ボランティアや学外コンテストなどの課外活動に積極的に取り組み、海外大学が配信する講義動画を翻訳するボランティア活動は、大きな反響を呼んだ。海外大学への進学指導も手厚く、2025年度は370名以上の海外大学合格者を出した。", "詳細_施設設備": "最新設備と快適な教育環境を提供 最新設備を完備した9階建ての校舎には、48個のソーラーパネルを設置。6階の化学、生物、物理それぞれ３つのサイエンスラボは、研究室レベルの設備を整え、授業の枠にとらわれない実験を行っている。図書館は37,000冊の蔵書があり、近隣の都立中央図書館とも連携。また、国内すべての図書館や研究機関、情報データベース、論文検索などに各自のICT機器からアクセスできる独自の「広尾学園リサーチ・ナビ」を提供し、2020年度より電子図書館「LibrariE（ライブラリエ）」を導入している。ICTルームは、ICT委員会など生徒たちが自主的に運営し、ICT機器のテクニカルサポート、最新の3Dプリンターやレーザーカッターを使った講座なども実施している。", "詳細_学校行事": "四季を通して生徒主体のイベントを開催 春のオリエンテーション合宿（中1、高1）、研修合宿（中2）、初夏のスポーツフェスティバル、夏の林間学校（中2）、秋のけやき祭（文化祭）、修学旅行（中3、高2）、冬の音楽会など年間を通じてイベントを開催。文化祭や音楽会などは、生徒が主体となって運営を行う。オペラ鑑賞（高1）、歌舞伎教室（中3）などの芸術鑑賞、オーストラリア短期留学（中3希望者）やイギリス短期留学（高1希望者）も実施している。", "詳細_部活動": "学業との両立を図り、約8割の生徒が参加 運動部は、専門のコーチが指導するチアリーディングやダンス、サッカー、バスケットボール、野球など、文化部は英会話、美術、吹奏楽、ディベート、演劇、STEMなどがある。その他、写真、Film Club、Coding Club、Inter Press Club、English Debate Club、Model United Nations Clubなどの同好会があり、約8割の生徒が参加している。仲間と切磋琢磨しながら、自ら可能性に挑戦することで「自律と共生」を身につけている。", "詳細_進路指導": "「本物」に触れるキャリアプログラムを実施 各分野の第一線で活躍する人物や、最高レベルの研究に触れる「キャリア教育・中高大連携プログラム」を実施し、中1から参加が可能。多彩なゲストを招いた「特別講演会」、研究学園都市を訪問する「つくばサイエンスツアー」、国立天文台やJAXAなどの協力で実現した「宇宙天文合宿」、東京地裁を傍聴し、裁判官や弁護士の話を聞く「司法裁判講座」、「All English実験講座」、東京大学や株式会社スクウェア・エニックスでアプリ、ゲーム開発やアニメーションなどを学ぶ「広学Tech Camp」など、生徒の将来の夢や学習意欲を育む多彩なプログラムを用意している。 また、国内大学の説明会や、海外大学の担当者が一斉に集う「海外大学フェア」の開催、国内外の大学に進学した卒業生による講演会を実施するなど多様な進路選択を考える機会を設けている。", "詳細_その他": "最先端の講座「広学スーパーアカデミア」「病理診断講座」 毎年3月に、「キャリア教育・中高大連携プログラム」の総決算となる「広学スーパーアカデミア」を開催。各分野の最先端、キャリアの最前線で活躍する人々が一同に集結し、2024年度は35の「超一級講座」を展開。中1～高2生が自分の興味ある分野を受講する。 近年は、「病理診断講座」という病院と同じレベルの病理診断をして、現役の医師の前で発表する講座を実施。もっとも優秀な発表をしたグループは、病院で行われる手術に立ち会うことができる。医進・サイエンスコースからスタートした「病理診断講座」は、現在、全コースの参加が可能。", "詳細_制服": "アーバングレーのブレザー 男女共通のブレザーは都会的なアーバングレー。5種類のグレーに染めた原毛を織り交ぜた手間のかかるもので、深い色合いとつややかな素材感が特徴。女子のスラックスもある。", "詳細ページ": "schools/B13P111.html", "過去問PDF件数": "99"}, {"学校名": "東京女学館中学校", "study1_id": "B13P089", "住所": "〒150-0012 東京都渋谷区広尾3-7-16", "TEL": "TEL 03-3400-0867", "最寄駅・アクセス": "日比谷線「広尾駅」4番より徒歩12分、各線「渋谷駅」よりバ りある美しいキャンパスで小学校から高校までともに学ぶ。記念講堂は照明や音響など最新の諸設備を備え、スタンウェイのフルコンサートピアノを所有。図書館は蔵書約6万1千冊。体育館は3つ、うち一つは観客スタンド設置で国際試合も開催できる広さを誇る。開閉式天井の快適な室内温水プール。収納力・使い勝手とも抜群の個人ロッカー。広い食堂はメニューも豊富で焼きたて自家製パンも人気だ。", "詳細_学校行事": "体育大会・創立記念祭の二大行事、中1から高2まで行われる宿泊行事 6月に開催される体育大会は、学年対抗で競われる競技のほかに、中2から高2までの各学年によるダンスが彩りを添える。高3が演じるカドリール・プロムナードは本校の象徴。 11月の創立記念祭（学園祭）では、学習の成果を発表するクラス展示・学年展示のほか、運動部が他校と対戦する招待試合、文化部の展示・舞台発表・演奏など、クラブや委員会の活動の成果を発表する。 宿泊行事は、中1から高2まで毎年行っている。5月には中2のイングリッシュキャンプ、高1の研修旅行。7月には中1が軽井沢学習寮に宿泊して、自然に触れ、カーリング体験などを通して友と親睦を深める。12月には中3が広島修学旅行に行き、平和学習に取り組む。3月には高2が京都・奈良修学旅行に行き、自国文化について理解を深める。", "詳細_部活動": "オーケストラ部、ダンス部、パフォーマンス部など多彩 クラブ活動が盛ん。活動日は週2回～3回など、クラブによる。運動部は、ダンス部、ソフトボール部、テニス部、剣道部など（計9）。水泳部は校内の温水プールで練習し、関東大会にも出場している。文化部は、演劇部、茶道部（裏千家・表千家）、書道部、ギター部など（計20）。部員100名超のオーケストラ部、チアダンスやジャグリングを行うパフォーマンス部、英語のミュージカルを上演する英語部、百人一首の競技かるたに取り組むかるた部など、ユニークなクラブが豊富だ。同好会は模擬国連同好会、ストリートダンス同好会など（計4）。", "詳細_進路指導": "例年東大、一橋大などに合格。難関私立大・医歯薬系も多数 生徒が中心になって進路について学ぶ。中3では働いている方へのインタビューを通して職業研究を実施する。高1の研修旅行では1人1人自分自身の将来の目標についてスピーチを行う。このような機会を通して職業観を養い進路選択に向けて自己をみつめていく。高2以降は文理に分かれて大学進学を見据えて学習し、自由選択科目も多様に設置されている。 例年東大、一橋大、東京外語大、東京藝術大、国際教養大など難関国公立大に合格、私立大学も早慶上智、東京理科大、GMARCH、医歯薬系など多数合格している。指定校推薦は東京女子医科大、聖マリアンナ医科大、慶應義塾大、早稲田大、上智大、立教大、青山学院大、北里大など多数。", "詳細_その他": "インクルーシブリーダーシップを育成する生徒会活動 生徒自治を推進している。その中心となるのが生徒会だ。生徒総会を最高の議決機関とし、生徒会長をはじめとする執行委員会、各委員会の委員長などが中心となって、全校生徒が協力し合い、学校行事や日常生活のルールなどを民主的に決定している。また、体育大会、修学旅行、研修旅行は生徒主体の実行委員会により運営される。 こうした活動は、東京女学館がめざす「リーダーシップ」と「インクルーシブリーダーシップ」の両方の養成につながっている。インクルーシブリーダーシップとは、人間同士の信頼関係を自ら築き、それを基によりよい社会をつくりあげていく力のことであり、東京女学館では21世紀を生きる人々に求められる力として大切にしている。", "詳細_制服": "伝統の白いセーラー服 東京女学館の制服は今から100年前の1930年(昭和5)に制定された。同校で約45年間英語を教えた英国人教師ドロセア・E・トロット女史が提案した「英国では高貴な人は白を着る」という言葉に、「品性を高め、真剣に学べ」という女学館に受け継がれる精神を重ね合わせ、白いセーラー服となった。胸元の青いシルクのリボンとともに受け継がれるこのセーラー服は東京女学館のアイデンティティの1つとして、在校生や卒業生からも長く愛されている。", "詳細ページ": "schools/B13P089.html", "過去問PDF件数": "110"}, {"学校名": "普連土学園中学校", "study1_id": "B13P115", "住所": "〒108-0073 東京都港区三田4-14-16", "TEL": "TEL 03-3451-4616", "最寄駅・アクセス": "都営浅草線「三田駅」より徒歩7分、JR「田町駅」より徒歩8分", "公式URL": "http  - 63", "みんな偏差値URL": "https://www.minkou.jp/junior/school/7504/", "首都圏模試偏差値": "女62-67", "首都圏模試URL": "https://www.syutoken-mosi.co.jp/db/school/?code=1244\u0026p=3", "四谷大塚偏差値": "A80 女49-56 / C50 女46-52", "四谷大塚A80偏差値": "女49-56", "四谷大塚C50偏差値": "女46-52", "四谷大塚偏差値詳細": "女 02/01 普連土学園（１日午前４科） A80:49 C50:46 | 女 02/01 普連土学園（１日午後算数） A80:56 C50:52 | 女 02/02 普連土学園（２日午後２科） A80:55 C50:50 | 女 02/04 普連土学園（４日午前４科） A80:52 C50:48", "四谷大塚URL": "https://www.yotsuyaotsuka.com/juken/data/?code=653", "詳細_建学の精神、教育理念": "キリスト教フレンド派の精神に基づく教育 キリスト教フレンド派(クエーカー)の創始者ジョージ・フォックスの言葉“Let Your Lives Speak”（あなたの生き方をもって示しなさい）を教育理念とし、6学年合わせて750名ほどの生徒を対象に、あらゆる権威・伝統からの｢自由｣、神の前での「平等」、粘り強い｢対話｣、絶対的｢平和主義｣という4つの価値観を元に教育を行っている。", "詳細_教育の特色": "毎朝の礼拝、独自科目の論文科など 毎朝の礼拝を通して豊かな心を涵養する。毎週水曜日は静かな祈りの時間として沈黙の礼拝を行い、自己と向き合う。 先取り授業により、中3の主要教科では高校分野の学習を行っている。高2から文系・理系に分かれるが、数学は高2まで必修。国公立文系をめざす生徒も高2までには大学入試範囲を修了する。高3では選択授業を多数設け、10名以下の少人数で授業を行う。 中学の数学、英会話などは少人数分割授業、高校の英語、数学、化学、古典は習熟度別授業を実施。また、数学、英語、社会は学年によりティームティーチングで授業を行っている。 独自科目の論文科を設置し、小論文の指導を行っている。高校では小論文コンクールも実施し、書く力を高め、大学入試やAO入試などに備える。 英語教育として、外国人教員による少人数の英会話授業では、劇やゲーム、タブレットを用いた英語スキット作製などに取り組む。高校の選択授業では、英語の新聞や雑誌などを読み、それに基づいてディスカッションするCross Cultural Understanding などが行われている。高1ではニュージーランドへのターム留学に6名の枠あり。 理科は中1で50回、高1で30回の理科実験と、高2の文理選択時までの実験を充実させている。理系進学率が高く、5年間平均で35％以上となっている。", "詳細_施設設備": "生徒の語らい場が随所に 普連土学園中学校では、キリスト教フレンド派の日本唯一の学校として、創立以来130余年にわたり「簡素」「温かさ」「落ち着き」「誠実」を大切にし、校舎にもこの精神を反映させている。屋上庭園、バルコニー、ライトコートなど、生徒の語らい場が随所設けられている。 広い閲覧コーナーのある図書館、明るい音楽室、礼拝専用の施設として静黙室がある。", "詳細_学校行事": "学園ならではのGeorge Fox Tour（英国研修旅行） 生徒会をはじめ自治会組織が中心となって、生徒自ら行事を創り上げている。5月は遠足（中2）、体育祭、6月は聖句暗誦会（中学）、東北修学旅行（中3）、お茶会（中1）、7～8月は奈良・京都修学旅行（高2）、フレンド派の創始者であるジョージ・フォックスの信仰と足跡をたどるGeorge Fox Tour（英国研修旅行・高1・高2希望者）、9～10月は学園祭、11月は感謝祭礼拝、12月はクリスマス礼拝、3月はお茶会（高3）。", "詳細_部活動": "自由参加で中高いっしょに活動 普連土学園中学校では、部活は自由参加で中学生と高校生がいっしょに活動している。運動部は剣道部、ソフトボール部、テニス部、ハイキング部、体操部、フォークダンス部など9。文化部はESS部、演劇部、軽音楽部、手話部、吹奏楽部、陶芸部、理科部、囲碁部、華道など13。", "詳細_進路指導": "2025年は東京大学をはじめ現役合格多数 普連土学園では、中学で地域研究や社会科論文、職場訪問などに取り組み、高校では研究論文の執筆、卒業生による進路相談会、保護者による職業講演会など、6年間   <script>
    const data = JSON.parse(document.getElementById('embedded-data').textContent);
    const schools = data.schools;
    const events = data.events;
    const pastExams = data.pastExams || [];

    const q = document.getElementById('q');
    const schoolFilter = document.getElementById('schoolFilter');
    const placeFilter = document.getElementById('placeFilter');
    const limitFilter = document.getElementById('limitFilter');
    const monthFilter = document.getElementById('monthFilter');
    const schoolRoot = document.getElementById('schools');
    const eventRoot = document.getElementById('events');
    const calendarRoot = document.getElementById('calendar');
    const printCalendarRoot = document.getElementById('printCalendar');
    const calendarTitle = document.getElementById('calendarTitle');
    const calendarSummary = document.getElementById('calendarSummary');
    const visibleCount = document.getElementById('visibleCount');
    const reserveCount = document.getElementById('reserveCount');
    const startCount = document.getElementById('startCount');
    const eventSummary = document.getElementById('eventSummary');

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function link(url, label) {
      if (!url) return '';
      return `<a class="btn" href="${escapeHtml(url)}" target="_blank" rel="noopener">${label}</a>`;
    }

    function sourceLink(url, label) {
      return url
        ? `<a href="${escapeHtml(url)}" target="_blank" rel="noopener">${escapeHtml(label)}</a>`
        : escapeHtml(label);
    }

    function deviationRows(school) {
      const rows = [
        ['スタディ', school['スタディ偏差値'], school['スタディ偏差値URL']],
        ['みんな', school['みんな偏差値2026'], school['みんな偏差値URL']],
        ['首都圏模試', school['首都圏模試偏差値'], school['首都圏模試URL']],
        ['四谷大塚', school['四谷大塚偏差値'], school['四谷大塚URL']]
      ].filter(row => row[1]);
      if (!rows.length) return '<span class="muted">未取得</span>';
      return `<div class="dev-list">${rows.map(([label, value, url]) => `
        <div class="dev-line"><span>${sourceLink(url, label)}</span><strong>${escapeHtml(value)}</strong></div>
      `).join('')}</div>`;
    }

    function primaryDeviation(school) {
      const yotsuya = school['四谷大塚A80偏差値'] || '';
      const nums = yotsuya.match(/\d+/g);
      if (nums && nums.length) {
        const values = nums.map(Number);
        const min = Math.min(...values);
        const max = Math.max(...values);
        return min === max ? `Y${min}` : `Y${min}-${max}`;
      }
      return school['首都圏模試偏差値'] || school['みんな偏差値2026'] || school['スタディ偏差値'] || '';
    }

    function schoolByName(name) {
      return schools.find(school => school['学校名'] === name) || {};
    }

    function eventCountForSchool(name) {
      return events.filter(event => event['学校名'] === name).length;
    }

    function pastExamCountForSchool(school) {
      return Number(school['過去問PDF件数'] || 0);
    }

    function normalize(value) {
      return String(value || '').toLowerCase();
    }

    function eventText(event) {
      return [
        event['学校名'], event['開催日'], event['開催時間'], event['イベント名'],
        event['場所'], event['対象'], event['予約開始日・記載'], event['備考']
      ].join(' ');
    }

    function parseEventDate(event) {
      const match = String(event['開催日'] || '').match(/(\d{4})\/(\d{1,2})\/(\d{1,2})/);
      if (!match) return null;
      return new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
    }

    function monthKey(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
    }

    function monthLabel(key) {
      const [year, month] = key.split('-');
      return `${year}年${Number(month)}月`;
    }

    function getFilteredEvents(applyLimit = false) {
      const query = normalize(q.value);
      let filtered = events.filter(event => {
        const schoolMatch = !schoolFilter.value || event['学校名'] === schoolFilter.value;
        const placeMatch = !placeFilter.value || event['場所'] === placeFilter.value;
        const textMatch = !query || normalize(eventText(event)).includes(query);
        return schoolMatch && placeMatch && textMatch;
      });
      if (applyLimit && limitFilter.value !== 'all') filtered = filtered.slice(0, Number(limitFilter.value));
      return filtered;
    }

    function renderSchools() {
      schoolRoot.innerHTML = schools.map(school => `
        <article class="school">
          <div>
            <div class="school-title">
              <h3>${escapeHtml(school['学校名'])}</h3>
            </div>
            ${deviationRows(school)}
            <p>${escapeHtml(school['住所'])}</p>
            <p>${escapeHtml([school['設置'], school['学校種別']].filter(Boolean).join(' / '))} / イベント ${eventCountForSchool(school['学校名'])}件</p>
            <p>${escapeHtml(school['TEL'])}</p>
            <p>${escapeHtml(school['最寄駅・アクセス'])}</p>
          </div>
          <div class="school-actions">
            ${link(school['詳細ページ'], '詳細')}
            ${link(school['公式URL'], '公式')}
            ${link(school['説明会URL'], '説明会')}
          </div>
        </article>
      `).join('');
    }

    function populateFilters() {
      schoolFilter.innerHTML = '<option value="">すべて</option>' + schools
        .map(school => `<option value="${escapeHtml(school['学校名'])}">${escapeHtml(school['学校名'])}</option>`)
        .join('');

      const monthKeys = [...new Set(events.map(parseEventDate).filter(Boolean).map(monthKey))].sort();
      monthFilter.innerHTML = monthKeys
        .map(key => `<option value="${key}">${monthLabel(key)}</option>`)
        .join('');
    }

    function renderEvents() {
      const filtered = getFilteredEvents(true);

      visibleCount.textContent = filtered.length;
      reserveCount.textContent = filtered.filter(event => event['予約URL']).length;
      startCount.textContent = filtered.filter(event => event['予約開始日・記載']).length;
      eventSummary.textContent = `${filtered.length}件を表示`;

      if (!filtered.length) {
        eventRoot.innerHTML = '<div class="empty">条件に一致するイベントはありません。</div>';
        return;
      }

      eventRoot.innerHTML = filtered.map(event => {
        const reserveStart = event['予約開始日・記載'];
        const precision = event['予約開始精度'];
        const note = event['備考'];
        const precisionLabel = {
          exact: '開始日時あり',
          range: '受付期間あり',
          rule: '開始ルール',
          tentative: '予定',
          unknown: ''
        }[precision] || '';
        return `
          <article class="event">
            <div class="datebox">
              <span class="date">${escapeHtml(event['開催日'] || '随時')}</span>
              <span class="time">${escapeHtml(event['開催時間'] || '時間未掲載')}</span>
            </div>
            <div>
              <p class="event-school"><span class="dev">${escapeHtml(primaryDeviation(schoolByName(event['学校名'])) || '-')}</span>${escapeHtml(event['学校名'])}</p>
              <h3>${escapeHtml(event['イベント名'])}</h3>
              <div class="event-meta">
                ${event['場所'] ? `<span class="tag">${escapeHtml(event['場所'])}</span>` : ''}
                ${event['対象'] ? `<span class="tag">${escapeHtml(event['対象'])}</span>` : ''}
                ${event['予約'] ? `<span class="tag reserve">${escapeHtml(event['予約'].replace(' 予約する', ''))}</span>` : ''}
                ${reserveStart ? `<span class="tag start">${escapeHtml(reserveStart)}</span>` : ''}
                ${precisionLabel ? `<span class="tag precision">${escapeHtml(precisionLabel)}</span>` : ''}
              </div>
              ${note ? `<p class="note">${escapeHtml(note)}</p>` : ''}
            </div>
            <div class="event-actions">
              ${link(event['予約URL'], '予約ページ')}
              ${link(event['詳細URL'], '詳細')}
              ${link(event['予約開始根拠URL'], '開始日根拠')}
            </div>
          </article>
        `;
      }).join('');
    }

    function renderCalendar() {
      const key = monthFilter.value;
      if (!key) {
        calendarRoot.innerHTML = '<div class="empty">表示できる月がありません。</div>';
        calendarTitle.textContent = '-';
        calendarSummary.textContent = '';
        return;
      }

      const [year, month] = key.split('-').map(Number);
      const monthEvents = getFilteredEvents(false).filter(event => {
        const date = parseEventDate(event);
        return date && monthKey(date) === key;
      });
      const byDay = new Map();
      for (const event of monthEvents) {
        const date = parseEventDate(event);
        const day = date.getDate();
        if (!byDay.has(day)) byDay.set(day, []);
        byDay.get(day).push(event);
      }

      const first = new Date(year, month - 1, 1);
      const last = new Date(year, month, 0);
      const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
      const cells = weekdays.map(day => `<div class="weekday">${day}</div>`);
      for (let i = 0; i < first.getDay(); i++) cells.push('<div class="day is-empty"></div>');
      for (let day = 1; day <= last.getDate(); day++) {
        const items = byDay.get(day) || [];
        cells.push(`
          <div class="day ${items.length ? 'has-events' : ''}">
            <span class="day-number">${day}</span>
            ${items.map(event => `
              <a class="cal-event" href="${escapeHtml(event['詳細URL'] || event['予約URL'] || '#')}" target="_blank" rel="noopener">
                ${escapeHtml(event['イベント名'])}
                <small>${escapeHtml(event['学校名'])}${event['開催時間'] ? ' / ' + escapeHtml(event['開催時間']) : ''}</small>
              </a>
            `).join('')}
          </div>
        `);
      }
      const remainder = cells.length % 7;
      if (remainder) {
        for (let i = remainder; i < 7; i++) cells.push('<div class="day is-empty"></div>');
      }

      calendarTitle.textContent = monthLabel(key);
      calendarSummary.textContent = `${monthEvents.length}件`;
      calendarRoot.innerHTML = cells.join('');
    }

    function renderPrintCalendar() {
      const monthKeys = [...new Set(events.map(parseEventDate).filter(Boolean).map(monthKey))].sort();
      const weekdays = ['日', '月', '火', '水', '木', '金', '土'];

      printCalendarRoot.innerHTML = monthKeys.map(key => {
        const [year, month] = key.split('-').map(Number);
        const monthEvents = events.filter(event => {
          const date = parseEventDate(event);
          return date && monthKey(date) === key;
        });
        const byDay = new Map();
        for (const event of monthEvents) {
          const date = parseEventDate(event);
          const day = date.getDate();
          if (!byDay.has(day)) byDay.set(day, []);
          byDay.get(day).push(event);
        }

        const first = new Date(year, month - 1, 1);
        const last = new Date(year, month, 0);
        const cells = weekdays.map(day => `<div class="print-weekday">${day}</div>`);
        for (let i = 0; i < first.getDay(); i++) cells.push('<div class="print-day empty"></div>');
        for (let day = 1; day <= last.getDate(); day++) {
          const items = byDay.get(day) || [];
          cells.push(`
            <div class="print-day">
              <span class="print-day-number">${day}</span>
              ${items.map(event => `
                <div class="print-event">
                  <strong>${escapeHtml(event['イベント名'])}</strong>
                  <span>${escapeHtml(event['学校名'])}${event['開催時間'] ? ' / ' + escapeHtml(event['開催時間']) : ''}</span>
                  ${event['予約開始日・記載'] ? `<span>${escapeHtml(event['予約開始日・記載'])}</span>` : ''}
                </div>
              `).join('')}
            </div>
          `);
        }
        const remainder = cells.length % 7;
        if (remainder) {
          for (let i = remainder; i < 7; i++) cells.push('<div class="print-day empty"></div>');
        }

        return `
          <section class="print-month">
            <div class="print-title">
              <h1>${monthLabel(key)} 中学イベントカレンダー</h1>
              <p>${monthEvents.length}件 / 取得基準日 2026-04-30</p>
            </div>
            <div class="print-grid">${cells.join('')}</div>
          </section>
        `;
      }).join('');
    }

    [q, schoolFilter, placeFilter, limitFilter].forEach(control => {
      control.addEventListener('input', renderEvents);
      control.addEventListener('change', renderEvents);
    });

    [q, schoolFilter, placeFilter].forEach(control => {
      control.addEventListener('input', renderCalendar);
      control.addEventListener('change', renderCalendar);
    });
    monthFilter.addEventListener('change', renderCalendar);

    renderSchools();
    populateFilters();
    renderCalendar();
    renderPrintCalendar();
    renderEvents();
  </script>
</body>
</html>
